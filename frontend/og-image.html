<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8" />
  <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 1200px;
      height: 630px;
      overflow: hidden;
      font-family: 'Rubik', sans-serif;
      background: #1a0f05;
      color: #fef3e2;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 32px;
      position: relative;
    }
    .emoji {
      font-size: 120px;
      line-height: 1;
    }
    .title-en {
      font-size: 72px;
      font-weight: 900;
      letter-spacing: -1px;
      direction: ltr;
    }
    .title-he {
      font-size: 42px;
      font-weight: 700;
      color: #a08060;
      direction: rtl;
    }
    .bottom-bar {
      position: absolute;
      bottom: 24px;
      width: 100%;
      text-align: center;
      font-size: 18px;
      color: #a08060;
      direction: ltr;
    }
  </style>
</head>
<body>

  <div class="emoji">💩</div>
  <div class="title-en">Can I Poop?</div>
  <div class="title-he">אפשר לעשות קקי?</div>
  <div class="bottom-bar">canipoop.com</div>

</body>
</html>
